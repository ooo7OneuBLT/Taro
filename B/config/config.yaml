# ============================================================
# 太郎 A2 設定ファイル
# ============================================================

# --- 太郎の脳 ---
brain:
  type: gru                # 再帰ネットの種類（gru / lstm）
  embedding_dim: 64        # 文字埋め込みの次元数
  hidden_dim: 128          # 隠れ状態の次元数
  num_layers: 1            # 再帰層の数
  initial_temperature: 2.0 # 出力のゆらぎ（τ）。高い＝喃語、低い＝安定
  min_temperature: 0.3     # τの下限（完全に0にはしない＝探索を残す）
  temperature_alpha: 0.02  # τの適応減衰係数（A2変更：成功体験に連動）
  device: cpu              # 実測でCPUがGPUより約1.6倍速い（バッチ1・極小モデルのため）

# --- 発声体力（A2追加）【人間模倣・身体的制約】---
stamina:
  initial: 3               # 初期体力（最大何文字出せるか）
  growth_rate: 0.001        # 1ターンごとの体力上限の成長量（ゆっくり成長）
  max_stamina: 15           # 体力の上限（成長しきった大人）

# --- 声道の成熟スケジュール（A2-3追加）【人間模倣・身体的制約】---
# 1シミュレーション秒 = 1現実秒として設定。
# 学習とは無関係（身体の成熟）。時間が来れば自動的に解禁される。
vocal_maturation:
  stage1_time: 15552000   # 6ヶ月（180日）：唇＋鼻音・破裂音が使える（規準喃語開始）
  stage2_time: 23328000   # 9ヶ月（270日）：舌（歯茎以降）も使える
  stage3_time: 31536000   # 12ヶ月（365日）：声帯の有声/無声制御
  decouple_time: 28512000 # 11ヶ月（330日）：調音点と調音法が独立制御可能になる

# --- 報酬の重み ---
reward:
  w_imit: 0.5    # 模倣衝動の重み
  w_pred: 0.3    # 予測成功の重み
  w_social: 0.2  # 社会的報酬（親の笑顔）の重み
  w_home: 0.3    # 恒常性報酬の重み（B追加）

# --- 身体シミュレーション（B追加）---
stomach:
  capacity: 1.0           # 胃の容量
  digestion_rate: 0.001   # 1tickの消化率（中身に比例）。約50分で空になる（B-3調整）
  initial_contents: 0.5   # 生まれた時の胃の中身（やや空腹で誕生）
  growth_rate: 0.0001     # 胃の容量の成長速度

lungs:
  capacity: 3.0          # 肺活量（モーラ数相当）
  air_per_mora: 1.0      # 1モーラに必要な空気量
  recovery_rate: 0.5     # 1tickの空気回復量
  growth_rate: 0.000001  # 肺活量の成長速度（B-6調整：~90日で上限到達）
  max_capacity: 8.0      # 肺活量の上限（B-6調整：9ヶ月児の現実 3〜8モーラ）

# --- 血管（B-3追加）【人間模倣・身体シミュレーション】---
# 胃の消化 → 血糖値（上昇） → 体の細胞が消費（下降） → hunger
# 「胃が空 = 空腹MAX」を解消するバッファ。血管の詳細は将来。
blood_vessel:
  initial_glucose: 0.5       # 生まれた時の血糖値（0〜1）。やや空腹で誕生
  consumption_rate: 0.0001   # 1秒あたりの消費量。血糖値1.0→0.5まで約83分
  glucose_efficiency: 3.0    # 胃の吸収量→血糖値への変換効率。消化した栄養素の
                             # 血中濃度の比率。3.0=1単位の消化が血糖3単位相当に

# --- 学習 ---
learning:
  lr: 0.01                    # 学習率（A2-2で引き上げ：声道の探索空間が広いため）
  baseline_momentum: 0.95     # baseline（報酬予測）の移動平均の慣性
  max_output_length: 50       # 太郎が1回に産出できる最大文字数（体力が優先）
  grad_clip: 1.0              # 勾配の上限（学習の暴走防止）

# --- 海馬（B-5追加）【人間模倣・睡眠依存性記憶固定】---
# 覚醒中の喃語経験を一時保存し、睡眠移行時に大脳皮質へ転送する。
# McClelland et al. (1995) 補完学習システム理論（CLS）に基づく。
hippocampus:
  max_capacity: 500   # 1回の睡眠前に蓄積できる最大エピソード数

# --- アデノシン（B-4追加）【人間模倣・睡眠圧のメカニズム】---
# 覚醒中に脳活動→アデノシン産生→蓄積→眠さ。睡眠中に除去（Borbély, 1982）。
# sleepiness = adenosine.level（係数で直接いじらず、このノードを通す）
adenosine:
  production_rate: 0.0001   # 覚醒中の基礎産生量（/秒）。arousal=0のとき
                             # arousal=0.5なら実効 0.00015/s → 約1.7時間で閾値到達
  clearance_rate: 0.0003    # 睡眠中の除去率（/秒）。4時間睡眠で level≒0.01 まで低下

# --- 成功条件（B-3変更：N/M方式）---
success:
  partial_threshold: 0.8   # 基本達成：類似度がこの値以上を「成功」とみなす
  partial_window: 10        # 直近N回を記録する
  partial_success: 8        # N回中M回以上成功で目標達成（10連続より現実的）
  exact_streak: 10          # 完全一致の連続回数（参考記録）

# --- シミュレーション内時間 ---
sim_clock:
  seconds_per_turn: 5.0       # 1回のやり取り＝sim時間で何秒
  log_interval_turns: 10      # 何ターンごとにログ出力するか

# --- 成長アーカイブ ---
archive:
  snapshot_interval_turns: 100  # 何ターンごとに自動スナップショット
  archive_dir: archive          # 保存先ディレクトリ

# --- ログ ---
logging:
  log_dir: logs
  log_every_turn: true         # 毎ターンのJSONLログ
  plot_interval_turns: 50      # 何ターンごとに学習曲線PNGを更新
