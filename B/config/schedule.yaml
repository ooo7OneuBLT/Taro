# ============================================================
# 親のスケジュール設定（実験ごとに変更可能）
# ============================================================
# 太郎本体を触らず、このファイルだけで実験条件を切り替えられる。
# 例：ネグレクト環境 → presence_prob: 0.2, respond_prob: 0.3
#     手厚い環境   → presence_prob: 0.95, respond_prob: 1.0

# --- 親の在/不在 ---
presence:
  prob: 0.7             # 各判定時点で親がいる確率
  check_interval: 100   # 何秒ごとに在/不在を判定するか

# --- 泣きへの反応 ---
respond:
  prob: 0.9             # 泣きに反応する確率（在宅時）
  prob_absent: 0.1      # 不在時に泣きで戻ってくる確率
  delay_min: 1          # 反応までの最短時間（秒）
  delay_max: 30         # 反応までの最長時間（秒）
  delay_max_absent: 90  # 不在から戻るときの最長時間（秒）

# --- 食事 ---
# B2-14：授乳は「需要ベース＋満腹まで＋年齢graded」。1回の授乳量は月齢で変わる
# （新生児=少量→成長で増える。parent_sim_b の _age_feed_amount）。ここの amount は
# 旧経路互換のため残すが、実際の量は月齢から算出する。
feeding:
  amount: 0.6           # （旧・未使用）互換のため残置

# --- 時間割授乳（B2-14・年齢graded）---
# 人間は 0-6ヶ月ほぼ需要ベース（空腹で飲む）、6ヶ月から離乳で時間割が増え、18ヶ月で
# 3食＋間食2回へ（CDC/AAP/Solid Starts, 参考文献§9）。これを模倣：時間割の食事回数を
# 月齢で 0→5 に段階的に増やす（parent_sim_b.meals_for_age）。時刻は day_start〜day_end に
# 均等配置。空腹サイクルを殺さないため、若い時期はほぼオンデマンドのみにする。
# 語と空腹の相関は、成長後の時間割食＋親の随伴反応(#4)で緩める（force-feedingに頼らない）。
meals:
  enabled: true
  day_start: 25200      # 7:00（日中の食事帯の開始）
  day_end: 75600        # 21:00（終了）

# --- 喃語（B-3追加）---
babble:
  interval: 45          # 穏やかな時間に喃語を出す間隔（秒）
  arousal_threshold: 0.3  # このつらさ以下なら喃語を出す

# --- 喃語への親の随伴反応（B-10追加）---
# Goldstein & Schwade (2008): 養育者は乳児の自発発声の約30-50%に気づいて反応し、
# 反応をもらった発声パターンほど乳児は再び自発的に発するようになる。
# B-9まで自発喃語（self_babble）は知覚学習のみで、発声を選ぶ部位に
# 報酬が一切届いていなかった。この経路を追加する。
babble_response:
  prob: 0.4             # 喃語に親が気づいて反応する確率（研究値30-50%の中間）

# --- 世話のときの発話 ---
speech:
  enabled: true         # 世話のとき言葉を添えるか
  words:                # 世話の種類ごとの言葉
    feed: "まんま"       # 食事のとき
    comfort: "よしよし"  # あやすとき
    hold: "まま"         # 抱っこのとき

# --- シミュレーション ---
simulation:
  max_seconds: 3600     # デフォルトのシミュレーション時間（秒）
  log_interval: 300     # 何秒ごとにサマリーを出すか
