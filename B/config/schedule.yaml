# ============================================================
# 親のスケジュール設定（実験ごとに変更可能）
# ============================================================
# 太郎本体を触らず、このファイルだけで実験条件を切り替えられる。
# 例：ネグレクト環境 → presence_prob: 0.2, respond_prob: 0.3
#     手厚い環境   → presence_prob: 0.95, respond_prob: 1.0

# --- 親の在/不在 ---
presence:
  prob: 0.7             # 各判定時点で親がいる確率
  check_interval: 100   # 何秒ごとに在/不在を判定するか

# --- 泣きへの反応 ---
respond:
  prob: 0.9             # 泣きに反応する確率（在宅時）
  prob_absent: 0.1      # 不在時に泣きで戻ってくる確率
  delay_min: 1          # 反応までの最短時間（秒）
  delay_max: 30         # 反応までの最長時間（秒）
  delay_max_absent: 90  # 不在から戻るときの最長時間（秒）

# --- 食事 ---
# B-3以降：定期授乳なし。泣いて空腹（hunger > 0.5）のときだけ授乳する（オンデマンド）。
feeding:
  amount: 0.6           # 1回の授乳で胃に入る量（0〜1。1=満腹）

# --- 時間割授乳（B2-12で再導入）---
# B-3で外した定期授乳を、根拠をもって復活。人間の生後6〜12ヶ月は「決まった食事時刻」で
# 食べる（1日6〜10回, 2〜3時間おき。CDC/Solid Starts）。空腹ピークだけでなく食事時刻で
# 「まんま」を聞くことで、空腹と語の完全相関が崩れ、満腹寄りでもまんまを聞く機会ができる
# ＝語が空腹から独立した手がかりになる（理解=語→食べ物の先取り, 参考文献§9）。満腹時は
# 恒常性報酬が低いので「満腹時のまんまは嬉しくない」も自然に学ばれる。オンデマンド授乳は
# 残す（現実の赤ちゃんも空腹で泣けば時刻外でも授乳される）。
# times は1日の中の秒（0=0:00）。昼に寄せ、夜は長い間隔（睡眠中は食べない）。
# 空腹較正(consumption_rate=0.00003, 約3.2時間で空腹)と噛み合わせ、時刻の粗密で
# 空腹〜満腹の両方でまんまを聞くようにする。
meals:
  enabled: true
  times: [25200, 36000, 43200, 54000, 64800, 75600]  # 7, 10, 12, 15, 18, 21時（1日6回）

# --- 喃語（B-3追加）---
babble:
  interval: 45          # 穏やかな時間に喃語を出す間隔（秒）
  arousal_threshold: 0.3  # このつらさ以下なら喃語を出す

# --- 喃語への親の随伴反応（B-10追加）---
# Goldstein & Schwade (2008): 養育者は乳児の自発発声の約30-50%に気づいて反応し、
# 反応をもらった発声パターンほど乳児は再び自発的に発するようになる。
# B-9まで自発喃語（self_babble）は知覚学習のみで、発声を選ぶ部位に
# 報酬が一切届いていなかった。この経路を追加する。
babble_response:
  prob: 0.4             # 喃語に親が気づいて反応する確率（研究値30-50%の中間）

# --- 世話のときの発話 ---
speech:
  enabled: true         # 世話のとき言葉を添えるか
  words:                # 世話の種類ごとの言葉
    feed: "まんま"       # 食事のとき
    comfort: "よしよし"  # あやすとき
    hold: "まま"         # 抱っこのとき

# --- シミュレーション ---
simulation:
  max_seconds: 3600     # デフォルトのシミュレーション時間（秒）
  log_interval: 300     # 何秒ごとにサマリーを出すか
