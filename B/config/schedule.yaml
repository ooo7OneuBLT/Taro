# ============================================================
# 親のスケジュール設定（実験ごとに変更可能）
# ============================================================
# 太郎本体を触らず、このファイルだけで実験条件を切り替えられる。
# 例：ネグレクト環境 → presence_prob: 0.2, respond_prob: 0.3
#     手厚い環境   → presence_prob: 0.95, respond_prob: 1.0

# --- 親の在/不在 ---
presence:
  prob: 0.7             # 各判定時点で親がいる確率
  check_interval: 100   # 何秒ごとに在/不在を判定するか

# --- 泣きへの反応 ---
respond:
  prob: 0.9             # 泣きに反応する確率（在宅時）
  prob_absent: 0.1      # 不在時に泣きで戻ってくる確率
  delay_min: 1          # 反応までの最短時間（秒）
  delay_max: 30         # 反応までの最長時間（秒）
  delay_max_absent: 90  # 不在から戻るときの最長時間（秒）

# --- 食事 ---
feeding:
  interval: 600         # 定期的な食事の間隔（秒）。新生児は2-3時間だがsim時間で10分
  amount: 0.6           # 1回の食事で胃に入る量（0〜1。1=満腹）

# --- 世話のときの発話 ---
speech:
  enabled: true         # 世話のとき言葉を添えるか
  words:                # 世話の種類ごとの言葉
    feed: "まんま"       # 食事のとき
    comfort: "よしよし"  # あやすとき
    hold: "まま"         # 抱っこのとき

# --- シミュレーション ---
simulation:
  max_seconds: 3600     # デフォルトのシミュレーション時間（秒）
  log_interval: 300     # 何秒ごとにサマリーを出すか
