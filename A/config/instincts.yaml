  statistical_learning:
    name: 統計学習
    enabled: false
    location: internal
    source: 音の並びの遷移確率を学び単語を切り出す（Saffran, 1996）
    label: 人間模倣
    reward_key: null
    decay: none
    notes: A2で追加予定

  novelty:
    name: 新奇性／好奇心
    enabled: false
    location: internal
    source: 馴化と新奇選好（見慣れぬものを好む）
    label: 人間模倣
